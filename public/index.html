<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Examen - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
</head>

<body class="bg-light">
    <main class="container py-4">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
            <div>
                <h1 class="h3 mb-1">Gestión de Productos</h1>
                <p class="text-muted mb-0">CRUD con Node.js, Express y MongoDB</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="badge text-bg-primary">Examen</span>
                <span id="status" class="badge text-bg-secondary">Estado: cargando</span>
            </div>
        </div>

        <div class="row g-4">
            <section id="form-section" class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="h5 mb-3">Crear / Editar</h2>
                        <form id="producto-form" class="vstack gap-3">
                            <input type="hidden" id="producto-id" />
                            <div>
                                <label class="form-label">Nombre</label>
                                <input id="nombre" class="form-control" required />
                            </div>
                            <div>
                                <label class="form-label">Descripción</label>
                                <input id="descripcion" class="form-control" />
                            </div>
                            <div>
                                <label class="form-label">Precio</label>
                                <input id="precio" class="form-control" type="number" step="0.01" required />
                            </div>
                            <div>
                                <label class="form-label">Cantidad</label>
                                <input id="cantidad" class="form-control" type="number" required />
                            </div>
                            <div class="d-flex gap-2">
                                <button id="submit" class="btn btn-primary" type="submit">Guardar</button>
                                <button id="cancel" class="btn btn-outline-secondary" type="button">Cancelar</button>
                            </div>
                        </form>
                        <div id="form-message" class="alert alert-warning mt-3 d-none" role="alert"></div>
                    </div>
                </div>
            </section>

            <section id="list-section" class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
                            <h2 class="h5 mb-0">Productos</h2>
                            <div class="d-flex align-items-center gap-2">
                                <span class="text-muted">Total: <strong id="total">0</strong></span>
                                <button id="refresh" class="btn btn-sm btn-outline-primary" type="button">Recargar</button>
                            </div>
                        </div>
                        <div id="empty" class="alert alert-info d-none" role="alert">No hay productos en la base de datos.</div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Descripción</th>
                                        <th>Precio</th>
                                        <th>Cantidad</th>
                                        <th class="text-end">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="productos"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="/app.js"></script>
</body>

</html>
